<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bramleigh Building Gallery</title>
    <style>
        .header {
            top: 0;
            background-color: #FFBE0C;
            color: #000000;
            text-align: center;
            font-family: Arial, sans-serif;
            padding: 4%;
            border-radius: 8px;
            border-bottom: 5px solid #ffffff;
            font-size: 150%;
        }

        .description {
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 125%;
            color: #000000;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .gallery img {
            width: 500px;
            max-width: 100%;
            height: 360px;
            object-fit: cover;
            border-radius: 8px;
        }
        .home-button {
            position: absolute;
            left: 20px;
            top: 20px;
            background-color: #000000;
            color: #FFBE0C;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            border-bottom: 5px;
        }

        .home-button:hover {
            background-color: #333333;
        }
        @media screen and (max-width: 600px) {
            .gallery {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            .gallery img {
                width: 500px;
                max-width: calc(100% - 10px);
                height: 360px;
                object-fit: cover;
                border-radius: 8px;
            }
            .header {
                    padding: 30px 12px;
                    z-index: 1000;
            }

                .header h1 {
                    font-size: 24px;
                    margin: 0;
                    line-height: 1.2;
            }
            .home-button {
                position: absolute;
                left: 10px;
                top: 10px;
                padding: 8px 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header" id="myHeader">
        <a class="home-button" href="index.html">Home</a>
        <h1>Bramleigh Building Services</h1>
    </div>
    <div class="gallery">
        <div class="gallery-item">
            <img src="images/extension.jpeg" alt="House extension">
            <p class="description">House extension project completed in 2023.</p>
        </div>

        <div class="gallery-item">
            <img src="images/kitchen.jpeg" alt="Steel beam installation">
            <p class="description">Steel beam installation project completed in 2022.</p>
        </div>

        <div class="gallery-item">
            <img src="images/steelwork.jpeg" alt="Renovation project">
            <p class="description">Renovation project completed in 2021.</p>
        </div>

        <div class="gallery-item">
            <img src="images/patio.jpeg" alt="Completed build">
            <p class="description">Patio completed and build project finished in 2020.</p>
        </div>
    </div>
    <footer>
        <p style="text-align: center;">&copy; 2014 Bramleigh Building Services Ltd. All rights reserved.</p>
    </footer>
</body>
</html>
